<script>
var CSV_URL = 'https://docs.google.com/spreadsheets/d/1LpbwXSAHfY9QGtzK25B5nGhMf6eTpZDjE3mn3ZG3ELE/export?format=csv&gid=249714700';
var data = [];

function showPanel(name, btn) {
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('nav button').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
  window.scrollTo(0, 0);
}

function switchToTerms() {
  showPanel('terms', document.querySelector('nav button:nth-child(3)'));
}

function setLang(page, lang, btn) {
  document.querySelectorAll('#panel-' + page + ' .lang-content').forEach(function(el) { el.classList.remove('active'); });
  document.querySelectorAll('#panel-' + page + ' .lang-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById(page + '-' + lang).classList.add('active');
  btn.classList.add('active');
}

function parseCSVLine(line) {
  var cols = [];
  var cur = '';
  var inQ = false;
  for (var i = 0; i < line.length; i++) {
    var c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
    else { cur += c; }
  }
  cols.push(cur.trim());
  return cols;
}

async function loadData() {
  try {
    var res = await fetch(CSV_URL, { cache: 'no-cache', mode: 'cors' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    var text = await res.text();
    var lines = text.trim().split('\n');
    data = [];
    for (var i = 1; i < lines.length; i++) {
      var cols = parseCSVLine(lines[i]);
      if (cols.length < 4) continue;
      var iso3 = cols[0];
      var country = cols[1];
      var year = parseInt(cols[2]);
      var value = parseFloat(cols[3]);
      if (country && !isNaN(year) && !isNaN(value)) {
        data.push({ iso3: iso3, country: country, year: year, value: value });
      }
    }
    var countrySet = {};
    var countries = [];
    for (var j = 0; j < data.length; j++) {
      if (!countrySet[data[j].country]) {
        countrySet[data[j].country] = true;
        countries.push(data[j].country);
      }
    }
    countries.sort();
    var cSel = document.getElementById('country-sel');
    var cHtml = '<option value="">— Select Country —</option>';
    for (var k = 0; k < countries.length; k++) {
      cHtml += '<option value="' + countries[k] + '">' + countries[k] + '</option>';
    }
    cSel.innerHTML = cHtml;
    var yearSet = {};
    var years = [];
    for (var m = 0; m < data.length; m++) {
      if (!yearSet[data[m].year]) {
        yearSet[data[m].year] = true;
        years.push(data[m].year);
      }
    }
    years.sort(function(a, b) { return a - b; });
    var ySel = document.getElementById('year-sel');
    var yHtml = '';
    for (var n = 0; n < years.length; n++) {
      yHtml += '<option value="' + years[n] + '">' + years[n] + '</option>';
    }
    ySel.innerHTML = yHtml;
    ySel.value = years[years.length - 1];
    document.getElementById('load-status').className = 'status ok';
    document.getElementById('load-status').innerHTML = '✅ Data loaded: ' + data.length + ' records · ' + countries.length + ' countries · ' + years[0] + '–' + years[years.length - 1];
  } catch (e) {
    document.getElementById('load-status').className = 'status err';
    document.getElementById('load-status').innerHTML = '⚠ Failed to load data. Make sure the Google Sheets URL is set correctly and the sheet is published to the web (File → Share → Publish to web → CSV format).';
    console.error(e);
  }
}

function lookup() {
  var country = document.getElementById('country-sel').value;
  var year = parseInt(document.getElementById('year-sel').value);
  if (!country) { setResult('<span style="color:#aab3bb">Please select a country.</span>'); return; }
  var row = null;
  for (var i = 0; i < data.length; i++) {
    if (data[i].country === country && data[i].year === year) { row = data[i]; break; }
  }
  if (row) {
    setResult('<div class="result-country">' + row.country + ' <span style="font-size:14px;color:#7f8c8d">(' + row.iso3 + ')</span></div><div class="result-value">' + row.value + '%</div><div class="result-meta">Supply Side Food Self-Sufficiency Ratio (SSFSSR) · ' + row.year + '</div>');
  } else {
    setResult('<span style="color:#aab3bb">No data found for the selected combination.</span>');
  }
}

function showAll() {
  var country = document.getElementById('country-sel').value;
  if (!country) { setResult('<span style="color:#aab3bb">Please select a country.</span>'); return; }
  var rows = [];
  for (var i = 0; i < data.length; i++) {
    if (data[i].country === country) rows.push(data[i]);
  }
  rows.sort(function(a, b) { return a.year - b.year; });
  if (!rows.length) { setResult('<span>No data found.</span>'); return; }
  var min = rows[0].value, max = rows[0].value;
  for (var j = 0; j < rows.length; j++) {
    if (rows[j].value < min) min = rows[j].value;
    if (rows[j].value > max) max = rows[j].value;
  }
  var html = '<div class="result-country" style="margin-bottom:12px">' + rows[0].country + ' <span style="font-size:14px;color:#7f8c8d">(' + rows[0].iso3 + ')</span></div><table><tr><th>Year</th><th>SSFSSR (%)</th></tr>';
  for (var k = 0; k < rows.length; k++) {
    var style = '';
    if (rows[k].value === max) style = 'color:#c0392b;font-weight:700';
    else if (rows[k].value === min) style = 'color:#27ae60;font-weight:700';
    html += '<tr><td>' + rows[k].year + '</td><td style="' + style + '">' + (isNaN(rows[k].value) ? '—' : rows[k].value + '%') + '</td></tr>';
  }
  html += '</table><p style="font-size:12px;color:#7f8c8d;margin-top:10px">Min: ' + min + '% | Max: ' + max + '% | Change: ' + (rows[rows.length-1].value - rows[0].value).toFixed(1) + 'pp (' + rows[0].year + '→' + rows[rows.length-1].year + ')</p>';
  setResult(html);
}

function setResult(html) { document.getElementById('result').innerHTML = html; }

document.getElementById('contact-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  var fb = document.getElementById('form-feedback');
  var btn = this.querySelector('button[type="submit"]');
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    var res = await fetch(this.action, { method: 'POST', body: new FormData(this), headers: { 'Accept': 'application/json' } });
    if (res.ok) {
      fb.innerHTML = '<div class="status ok">Your inquiry has been sent successfully.</div>';
      this.reset();
    } else { throw new Error(); }
  } catch(err) {
    fb.innerHTML = '<div class="status err">Failed to send. Please try again or email us directly.</div>';
  }
  btn.disabled = false; btn.textContent = 'Send Inquiry';
});

loadData();
</script>
</body>
</html>
